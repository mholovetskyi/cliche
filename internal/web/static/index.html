<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cliche Studio</title>
<style>
  :root{--bg:#0c0c0e;--panel:#141417;--line:#26262b;--ink:#f4f3f0;--mut:#9a9aa2;--accent:#ff6a5a;--ok:#36c08a;--mono:ui-monospace,"Cascadia Code",Menlo,Consolas,monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--line);font-size:14px}
  header .logo{font-family:var(--mono);font-weight:700}.logo b{color:var(--accent)}
  header .sp{flex:1}
  header .stat{color:var(--mut);font-family:var(--mono);font-size:13px}
  #feed{flex:1;overflow:auto;padding:18px 16px;font-family:var(--mono);font-size:13.5px;line-height:1.55;white-space:pre-wrap}
  .ev{margin:2px 0}
  .delta{color:var(--ink)}
  .tool{color:var(--accent)}
  .result{color:var(--ok)}
  .err{color:#ff5a4d}
  .meta{color:var(--mut)}
  .card{border:1px solid var(--accent);background:rgba(255,106,90,.08);border-radius:10px;padding:12px 14px;margin:8px 0;font-family:-apple-system,Segoe UI,sans-serif}
  .card .q{margin-bottom:8px}.card .q b{color:var(--accent)}
  .card code{font-family:var(--mono);color:var(--ink)}
  .card .row{display:flex;gap:8px}
  .card button{border-radius:8px;border:1px solid var(--line);padding:6px 14px;cursor:pointer;font-weight:600}
  .card .allow{background:var(--ok);color:#06231a;border:0}
  .card .deny{background:transparent;color:var(--mut)}
  form{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--line)}
  input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:12px 14px;font-size:15px;outline:none}
  input:focus{border-color:var(--accent)}
  button{background:var(--accent);color:#1a0c0a;border:0;border-radius:10px;padding:0 18px;font-weight:700;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
  <header>
    <span class="logo">cli<b>che</b> studio</span>
    <span class="sp"></span>
    <span class="stat" id="stat">connecting…</span>
  </header>
  <div id="feed"></div>
  <form id="ask">
    <input id="prompt" placeholder="Describe what you want to build…" autocomplete="off" autofocus>
    <button id="send" type="submit">Build</button>
  </form>

<script>
  const feed = document.getElementById('feed');
  const stat = document.getElementById('stat');
  const form = document.getElementById('ask');
  const input = document.getElementById('prompt');
  const send = document.getElementById('send');
  let deltaLine = null;

  function add(cls, text){ const d=document.createElement('div'); d.className='ev '+cls; d.textContent=text; feed.appendChild(d); feed.scrollTop=feed.scrollHeight; return d; }

  function renderState(s){
    if(!s) return;
    const parts=[s.mode, s.model, '$'+(s.spent_usd||0).toFixed(4)];
    if(s.cap_usd>0) parts.push(Math.round(100*(s.spent_usd||0)/s.cap_usd)+'% of cap');
    if(s.ctx_frac>0) parts.push('ctx '+Math.round(100*s.ctx_frac)+'%');
    stat.textContent = parts.filter(Boolean).join('  ·  ') + (s.running?'  · working…':'');
    send.disabled = !!s.running;
  }

  const es = new EventSource('/api/events');
  es.onmessage = (m)=>{
    const e = JSON.parse(m.data);
    switch(e.kind){
      case 'begin': stat.textContent='ready'; break;
      case 'delta':
        if(!deltaLine) deltaLine = add('delta','');
        deltaLine.textContent += e.text; feed.scrollTop=feed.scrollHeight; break;
      case 'tool_call': deltaLine=null; add('tool','▸ '+e.text); break;
      case 'tool_result': deltaLine=null; add('result','✓ '+e.text); break;
      case 'state': renderState(e.data); break;
      case 'approval': deltaLine=null; renderApproval(e.data); break;
      case 'error': deltaLine=null; add('err','✗ '+e.text); break;
      case 'end': deltaLine=null; add('meta','— done —'); break;
    }
  };
  es.onerror = ()=>{ stat.textContent='disconnected'; };

  function renderApproval(a){
    if(!a) return;
    const card=document.createElement('div'); card.className='card';
    card.innerHTML = '<div class="q">Cliche wants to <b>'+a.kind+'</b>: <code></code></div>'
      + '<div class="row"><button class="allow">Allow</button><button class="deny">Not now</button></div>';
    card.querySelector('code').textContent = a.target;
    const answer=(allow)=>{ fetch('/api/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:a.id,allow})}); card.querySelector('.row').innerHTML='<span class="meta">'+(allow?'allowed':'declined')+'</span>'; };
    card.querySelector('.allow').onclick=()=>answer(true);
    card.querySelector('.deny').onclick=()=>answer(false);
    feed.appendChild(card); feed.scrollTop=feed.scrollHeight;
  }

  form.addEventListener('submit', async (ev)=>{
    ev.preventDefault();
    const p = input.value.trim(); if(!p) return;
    add('meta','❯ '+p); input.value=''; deltaLine=null; send.disabled=true;
    const r = await fetch('/api/prompt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p})});
    if(r.status===409) add('err','a run is already in progress');
    else if(!r.ok) add('err','request failed ('+r.status+')');
  });

  fetch('/api/state').then(r=>r.json()).then(renderState).catch(()=>{});
</script>
</body>
</html>
