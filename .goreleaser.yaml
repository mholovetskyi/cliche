version: 2
project_name: cliche

before:
  hooks:
    - go test ./...

builds:
  - id: cliche
    main: ./cmd/cliche
    binary: cliche
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/mholovetskyi/cliche/internal/cli.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - ROADMAP.md
      - SECURITY.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: ${artifact}.sigstore.json
    args:
      - sign-blob
      - --bundle=${artifact}.sigstore.json
      - ${artifact}
      - --yes
    artifacts: checksum
    output: true

# ---- one-line installers ----
# These generate Homebrew / Scoop / winget / deb+rpm manifests as release
# artifacts. Auto-publishing is OFF by default (skip_upload) so a release never
# fails before the tap/bucket repos exist. To enable: create the referenced repos
# (mholovetskyi/homebrew-tap, mholovetskyi/scoop-bucket) + a fork of
# microsoft/winget-pkgs, give the release a token with access, then set the
# matching skip_upload to "false".

homebrew_casks:
  - name: cliche
    repository:
      owner: mholovetskyi
      name: homebrew-tap
    homepage: "https://github.com/mholovetskyi/cliche"
    description: "The AI coding agent you can actually leave running — a trust-first CLI."
    skip_upload: "true"
    # Remove the Gatekeeper quarantine flag so an unsigned binary runs (standard
    # cask workaround). The checksums + cosign signature are the real provenance.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cliche"], must_succeed: false
          end

scoops:
  - name: cliche
    repository:
      owner: mholovetskyi
      name: scoop-bucket
    homepage: "https://github.com/mholovetskyi/cliche"
    description: "The AI coding agent you can actually leave running."
    license: "Apache-2.0"
    skip_upload: "true"

winget:
  - name: cliche
    publisher: mholovetskyi
    license: "Apache-2.0"
    homepage: "https://github.com/mholovetskyi/cliche"
    short_description: "The AI coding agent you can actually leave running."
    skip_upload: "true"
    repository:
      owner: mholovetskyi
      name: winget-pkgs
      branch: "cliche-{{ .Version }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

nfpms:
  - id: cliche
    package_name: cliche
    homepage: "https://github.com/mholovetskyi/cliche"
    description: "The AI coding agent you can actually leave running."
    license: "Apache-2.0"
    maintainer: "Mykola Holovetskyi"
    formats:
      - deb
      - rpm

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: mholovetskyi
    name: cliche
  draft: false
  prerelease: auto
  name_template: "cliché {{ .Tag }}"
  footer: |
    ---
    Verify a download against `checksums.txt` (`sha256sum -c checksums.txt`), then
    verify the checksums file's keyless cosign signature:

        cosign verify-blob --bundle checksums.txt.sigstore.json \
          --certificate-identity-regexp '^https://github.com/mholovetskyi/cliche/\.github/workflows/release\.yml@' \
          --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
          checksums.txt
