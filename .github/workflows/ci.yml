name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build & test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ['1.23', 'stable']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: gofmt
        if: runner.os == 'Linux'
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

      - name: test (race detector)
        if: runner.os == 'Linux'
        run: go test -race ./...

      - name: demo smoke test
        run: go run ./cmd/cliche demo
