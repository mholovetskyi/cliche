<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" role="img" aria-label="Cliché — the AI coding agent you can actually leave running">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9a78"/>
      <stop offset="0.55" stop-color="#ff5d4c"/>
      <stop offset="1" stop-color="#e0331f"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.74" cy="0.05" r="0.75">
      <stop offset="0" stop-color="#ff6a4d" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff6a4d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.1" cy="1" r="0.65">
      <stop offset="0" stop-color="#6f5cff" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#6f5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="330" rx="26" fill="#0a0a0c"/>
  <rect x="0" y="0" width="1200" height="330" rx="26" fill="url(#glowA)"/>
  <rect x="0" y="0" width="1200" height="330" rx="26" fill="url(#glowB)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="328.5" rx="25.25" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- serif wordmark — Clich in near-white, é in the brand gradient -->
  <text x="600" y="180" text-anchor="middle" font-family="'Playfair Display',Georgia,'Times New Roman',serif" font-size="148" font-weight="600" letter-spacing="-2">
    <tspan fill="#f3f3f5">Clich</tspan><tspan fill="url(#accent)">é</tspan>
  </text>

  <!-- tagline -->
  <text x="600" y="232" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="22" letter-spacing="0.4" fill="#aeaeb6">the AI coding agent you can actually leave running</text>

  <!-- the Trust Kernel, in a quiet mono row -->
  <text x="600" y="286" text-anchor="middle" font-family="ui-monospace,'Cascadia Code','JetBrains Mono','DejaVu Sans Mono',Menlo,Consolas,monospace" font-size="15" letter-spacing="0.3" fill="#74747f">hard token cap &#183; runaway breaker &#183; reward-hack verifier &#183; signed ledger</text>
</svg>
